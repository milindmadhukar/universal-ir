# =============================================================================
# Godrej AC — single-file ESPHome config for the dashboard / "ESPHome Builder".
#
# This is the ONLY file you paste into the builder. The custom climate logic
# (godrej_ac component) is pulled straight from GitHub, so there is no
# components/ folder to copy. You only need this file + your secrets.yaml.
#
# What it gives you in Home Assistant:
#   * Real climate thermostat card (temp / mode / fan).
#   * "Godrej Swing" select for the 10 fixed swing angles.
#   * RX SYNC: using the physical remote updates the HA state automatically
#     (climate card + swing select both follow the real AC).
#   * IR REPEATER switch: when ON, every received IR frame is re-blasted out
#     the LED (range extender / relay). Self-echo is suppressed so it never
#     re-ingests or loops its own transmissions.
# =============================================================================
substitutions:
  name: "godrej-ac"
  tx_pin: "GPIO4"
  rx_pin: "GPIO5"

esphome:
  name: ${name}
  friendly_name: Godrej AC
  on_boot:
    # Wire the swing select into the climate component so decoded frames can
    # update it. Done here because the select is a separate entity.
    priority: -100
    then:
      - lambda: "id(godrej)->set_swing_select(id(godrej_swing));"

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# Pulls the godrej_ac climate component from GitHub (found under
# esphome/components/godrej_ac in the repo). Pin to a tag/commit instead of
# @main if you want fully reproducible builds.
external_components:
  - source: github://milindmadhukar/universal-ir@main
    components: [godrej_ac]

logger:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Mesh/band-steering can cause "Auth Expired" loops; lock onto one BSSID.
  fast_connect: true
  ap:
    ssid: "${name} fallback"
    password: !secret ap_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

remote_transmitter:
  id: ir_tx
  pin: ${tx_pin}
  carrier_duty_percent: 50%

remote_receiver:
  id: ir_rx
  pin:
    number: ${rx_pin}
    inverted: true
    mode:
      input: true
      pullup: true
  tolerance: 25%
  idle: 25ms
  buffer_size: 2kb

climate:
  - platform: godrej_ac
    name: "Godrej AC"
    id: godrej
    transmitter_id: ir_tx
    receiver_id: ir_rx

# Swing has 10 fixed positions. They're exposed as a separate select because
# Home Assistant's climate swing_mode only allows a few fixed enum values.
# The option ORDER must match the GODREJ_SWING[] array indices in godrej_ac.h.
# Rename these in HA to whatever the angles actually are.
select:
  - platform: template
    name: "Godrej Swing"
    id: godrej_swing
    optimistic: true
    options:
      - "Angle 1"        # idx0
      - "Off / Straight" # idx1 (all-zero pattern)
      - "Angle 2"        # idx2
      - "Angle 3"        # idx3
      - "Angle 4"        # idx4
      - "Angle 5"        # idx5
      - "Angle 6"        # idx6
      - "Angle 7"        # idx7
      - "Angle 8"        # idx8
      - "Angle 9"        # idx9
    initial_option: "Off / Straight"
    on_value:
      then:
        - lambda: |-
            auto idx = id(godrej_swing).index_of(x);
            if (idx.has_value())
              id(godrej)->set_swing_index(*idx);

# IR repeater toggle. When ON, every received IR frame is re-transmitted out
# the LED (range extender / relay). State is decoded regardless; the repeat is
# the extra behaviour. Defaults OFF and is restored across reboots.
switch:
  - platform: template
    name: "IR Repeater"
    id: ir_repeater
    icon: "mdi:repeat-variant"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - lambda: "id(godrej)->set_repeater(true);"
    turn_off_action:
      - lambda: "id(godrej)->set_repeater(false);"
