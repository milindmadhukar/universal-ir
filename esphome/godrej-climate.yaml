# Godrej AC — full thermostat card in Home Assistant.
# Uses the custom godrej_ac climate component (esphome/components/godrej_ac),
# which synthesizes the LG-extended IR frame from temp/fan/swing/power + checksum.
substitutions:
  name: "godrej-ac"
  tx_pin: "GPIO4"
  rx_pin: "GPIO5"

esphome:
  name: ${name}
  friendly_name: Godrej AC

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

external_components:
  - source:
      type: local
      path: components

logger:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Mesh/band-steering can cause "Auth Expired" loops; lock onto one BSSID.
  fast_connect: true
  ap:
    ssid: "${name} fallback"
    password: !secret ap_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

remote_transmitter:
  id: ir_tx
  pin: ${tx_pin}
  carrier_duty_percent: 50%

remote_receiver:
  id: ir_rx
  pin:
    number: ${rx_pin}
    inverted: true
    mode:
      input: true
      pullup: true
  tolerance: 25%
  idle: 25ms
  buffer_size: 2kb

climate:
  - platform: godrej_ac
    name: "Godrej AC"
    id: godrej
    transmitter_id: ir_tx
    receiver_id: ir_rx

# Swing has 10 fixed positions. They're exposed as a separate select because
# Home Assistant's climate swing_mode only allows a few fixed enum values.
# The option ORDER must match the GODREJ_SWING[] array indices in godrej_ac.h.
# Rename these in HA to whatever the angles actually are.
select:
  - platform: template
    name: "Godrej Swing"
    id: godrej_swing
    optimistic: true
    options:
      - "Angle 1"        # idx0
      - "Off / Straight" # idx1 (all-zero pattern)
      - "Angle 2"        # idx2
      - "Angle 3"        # idx3
      - "Angle 4"        # idx4
      - "Angle 5"        # idx5
      - "Angle 6"        # idx6
      - "Angle 7"        # idx7
      - "Angle 8"        # idx8
      - "Angle 9"        # idx9
    initial_option: "Off / Straight"
    on_value:
      then:
        - lambda: |-
            auto idx = id(godrej_swing).index_of(x);
            if (idx.has_value())
              id(godrej)->set_swing_index(*idx);
