# =============================================================================
# universal-ir — single-file node config for the ESPHome dashboard / "Builder".
#
# This is the ONLY file you paste into the builder (plus your secrets.yaml).
# The custom IR component AND each device package are pulled from GitHub, so
# there is nothing else to copy.
#
# The node owns the shared infrastructure (Wi-Fi / API / OTA / IR hardware);
# each controlled appliance is a device package under devices/. Add more devices
# by listing their package files under `packages:`.
#
# Devices included:
#   * Godrej AC — thermostat card + swing select + RX state sync + IR repeater.
# =============================================================================
substitutions:
  name: "universal-ir"
  tx_pin: "GPIO4"
  rx_pin: "GPIO5"

esphome:
  name: ${name}
  friendly_name: Universal IR

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# Custom IR components (found under esphome/components in the repo). Pin to a
# tag/commit instead of @main for fully reproducible builds.
external_components:
  - source: github://milindmadhukar/universal-ir@main
    components: [godrej_ac]

# Devices controlled by this blaster, each a self-contained package.
packages:
  godrej_ac:
    url: https://github.com/milindmadhukar/universal-ir
    ref: main
    files: [esphome/devices/godrej-ac.yaml]
    refresh: 1d

logger:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Mesh/band-steering can cause "Auth Expired" loops; lock onto one BSSID.
  fast_connect: true
  ap:
    ssid: "${name} fallback"
    password: !secret ap_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

# Shared IR hardware. Device packages reference these ids (ir_tx / ir_rx).
remote_transmitter:
  id: ir_tx
  pin: ${tx_pin}
  carrier_duty_percent: 50%

remote_receiver:
  id: ir_rx
  pin:
    number: ${rx_pin}
    inverted: true
    mode:
      input: true
      pullup: true
  tolerance: 25%
  idle: 25ms
  buffer_size: 2kb
