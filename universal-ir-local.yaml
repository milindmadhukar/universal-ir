# =============================================================================
# universal-ir — LOCAL build of the node (uses files on disk).
#
# Offline twin of universal-ir.yaml: identical node, but it loads the component
# and device packages from the local tree instead of GitHub. Use this for
# `make` / local CLI builds and for editing the godrej_ac component.
#
# The node owns the shared infrastructure (Wi-Fi / API / OTA / IR hardware);
# each controlled appliance is a device package under devices/.
# =============================================================================
substitutions:
  name: "universal-ir"
  tx_pin: "GPIO4"
  rx_pin: "GPIO5"

esphome:
  name: ${name}
  friendly_name: Universal IR

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# Custom IR components used by the device packages below.
external_components:
  - source:
      type: local
      path: components

# Devices controlled by this blaster. Add more by dropping a package here.
packages:
  godrej_ac: !include devices/godrej-ac.yaml

logger:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Mesh/band-steering can cause "Auth Expired" loops; lock onto one BSSID.
  fast_connect: true
  ap:
    ssid: "${name} fallback"
    password: !secret ap_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

# Shared IR hardware. Device packages reference these ids (ir_tx / ir_rx).
remote_transmitter:
  id: ir_tx
  pin: ${tx_pin}
  carrier_duty_percent: 50%

remote_receiver:
  id: ir_rx
  pin:
    number: ${rx_pin}
    inverted: true
    mode:
      input: true
      pullup: true
  tolerance: 25%
  idle: 25ms
  buffer_size: 2kb
